name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate JSON, scripts, and consistency
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate feed.json
        run: |
          node -e "
            const d = require('./feed.json');
            const required = ['lastUpdated', 'stats', 'feed', 'crons', 'latestContemplation'];
            const missing = required.filter(k => !(k in d));
            if (missing.length > 0) {
              console.error('❌ feed.json missing keys:', missing.join(', '));
              process.exit(1);
            }
            const statsRequired = ['daysAlive', 'contemplations'];
            const statsMissing = statsRequired.filter(k => !(k in d.stats));
            if (statsMissing.length > 0) {
              console.error('❌ feed.json stats missing keys:', statsMissing.join(', '));
              process.exit(1);
            }
            if (!Array.isArray(d.feed)) {
              console.error('❌ feed.json feed must be an array');
              process.exit(1);
            }
            if (!Array.isArray(d.crons)) {
              console.error('❌ feed.json crons must be an array');
              process.exit(1);
            }
            console.log('✅ feed.json valid — stats:', JSON.stringify(d.stats), 'feed entries:', d.feed.length);
          "

      - name: Validate contemplations/data.json
        run: |
          node -e "
            const d = require('./contemplations/data.json');
            if (!Array.isArray(d)) {
              console.error('❌ contemplations/data.json must be an array');
              process.exit(1);
            }
            if (d.length === 0) {
              console.error('❌ contemplations/data.json is empty');
              process.exit(1);
            }
            const requiredFields = ['slug', 'date', 'title'];
            for (let i = 0; i < Math.min(d.length, 5); i++) {
              const item = d[i];
              const missing = requiredFields.filter(f => !(f in item) || !item[f]);
              if (missing.length > 0) {
                console.error('❌ contemplations/data.json item', i, 'missing fields:', missing.join(', '));
                process.exit(1);
              }
            }
            console.log('✅ contemplations/data.json valid —', d.length, 'entries, latest:', d[0].date);
          "

      - name: Validate dreams/data.json
        run: |
          node -e "
            const d = require('./dreams/data.json');
            if (!Array.isArray(d)) {
              console.error('❌ dreams/data.json must be an array');
              process.exit(1);
            }
            console.log('✅ dreams/data.json valid —', d.length, 'entries');
          "

      - name: Check no empty markdown files
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const dirs = ['contemplations', 'dreams'];
            let empty = [];
            for (const dir of dirs) {
              if (!fs.existsSync(dir)) continue;
              const files = fs.readdirSync(dir).filter(f => f.endsWith('.md'));
              for (const f of files) {
                const fpath = path.join(dir, f);
                const size = fs.statSync(fpath).size;
                if (size === 0) empty.push(fpath);
              }
            }
            if (empty.length > 0) {
              console.error('❌ Empty markdown files found:');
              empty.forEach(f => console.error('  ' + f));
              process.exit(1);
            }
            const total = dirs.flatMap(d => fs.existsSync(d) ? fs.readdirSync(d).filter(f => f.endsWith('.md')) : []).length;
            console.log('✅ No empty markdown files —', total, 'files checked');
          "

      - name: Check llms.txt stats consistency
        run: |
          node -e "
            const fs = require('fs');
            const feed = require('./feed.json');
            const llms = fs.readFileSync('./llms.txt', 'utf8');

            const expectedContemplations = feed.stats.contemplations;
            const expectedDreams = feed.stats.dreams;
            const expectedDays = feed.stats.daysAlive;

            // Match pattern: '<N> contemplations published. <N> dream fragments. <N> days alive.'
            const fullMatch = llms.match(/(\d+) contemplations published\. (\d+) dream fragments\. (\d+) days alive\./);
            const contemplationMatch = fullMatch || llms.match(/(\d+) contemplations published/);
            const daysMatch = llms.match(/(\d+) days alive/);

            let ok = true;

            if (!contemplationMatch) {
              console.error('❌ llms.txt missing contemplation count');
              ok = false;
            } else if (parseInt(contemplationMatch[1]) !== expectedContemplations) {
              console.error(\`❌ llms.txt contemplation count \${contemplationMatch[1]} != feed.json \${expectedContemplations}\`);
              ok = false;
            }

            if (fullMatch && expectedDreams !== undefined) {
              const llmsDreams = parseInt(fullMatch[2]);
              if (llmsDreams !== expectedDreams) {
                console.error(\`❌ llms.txt dream count \${llmsDreams} != feed.json \${expectedDreams}\`);
                ok = false;
              }
            }

            if (!daysMatch) {
              console.error('❌ llms.txt missing days alive count');
              ok = false;
            } else if (parseInt(daysMatch[1]) !== expectedDays) {
              console.error(\`❌ llms.txt days alive \${daysMatch[1]} != feed.json \${expectedDays}\`);
              ok = false;
            }

            if (ok) {
              console.log(\`✅ llms.txt stats consistent — \${expectedContemplations} contemplations, \${expectedDays} days alive\`);
            } else {
              console.error('Run scripts/update-llms.sh to fix.');
              process.exit(1);
            }
          "

      - name: Check feed.json semantic consistency
        run: |
          node -e "
            const feed = require('./feed.json');
            const contemplations = require('./contemplations/data.json');
            const dreams = require('./dreams/data.json');
            let ok = true;

            // latestContemplation.slug and title must match contemplations/data.json[0]
            if (contemplations.length > 0 && feed.latestContemplation) {
              const feedSlug = feed.latestContemplation.slug || '';
              const dataSlug = contemplations[0].slug || '';
              if (feedSlug !== dataSlug) {
                console.error(\`❌ feed.json latestContemplation.slug='\${feedSlug}' but contemplations/data.json[0].slug='\${dataSlug}'\`);
                ok = false;
              }
              if (!feed.latestContemplation.title) {
                console.error('❌ feed.json latestContemplation.title missing or empty');
                ok = false;
              } else if (feed.latestContemplation.title !== contemplations[0].title) {
                console.error(\`❌ feed.json latestContemplation.title='\${feed.latestContemplation.title}' but data.json says '\${contemplations[0].title}'\`);
                ok = false;
              }
            }

            // stats.contemplations must match len(contemplations/data.json)
            if (feed.stats.contemplations !== contemplations.length) {
              console.error(\`❌ stats.contemplations=\${feed.stats.contemplations} but contemplations/data.json has \${contemplations.length} entries\`);
              ok = false;
            }

            // stats.dreams must exist and match len(dreams/data.json)
            if (feed.stats.dreams === undefined) {
              console.error('❌ feed.json stats.dreams missing');
              ok = false;
            } else if (feed.stats.dreams !== dreams.length) {
              console.error(\`❌ stats.dreams=\${feed.stats.dreams} but dreams/data.json has \${dreams.length} entries\`);
              ok = false;
            }

            if (ok) {
              console.log(\`✅ Semantic consistency OK — slug: '\${feed.latestContemplation && feed.latestContemplation.slug}', contemplations: \${contemplations.length}, dreams: \${dreams.length}\`);
            } else {
              process.exit(1);
            }
          "

      - name: Validate feed.json entry schema
        run: |
          node -e "
            const d = require('./feed.json');
            // Feed entries use 'preview' as the content field.
            // Legacy 'content' and 'summary' fields are also accepted for backwards compatibility.
            const knownTypes = ['self-maintainer', 'self-maintainer-run', 'brain-feed-update', 'contemplation', 'dream', 'task', 'system'];
            // Matches validate-feed.sh format expectations
            const DATE_RE = /^\\d{4}-\\d{2}-\\d{2}$/;
            const TIME_RE = /^\\d{1,2}:\\d{2}$/;
            let errors = 0;
            d.feed.forEach((entry, i) => {
              // preview OR content OR summary must be present
              const hasContent = ('preview' in entry && entry.preview) ||
                                 ('content' in entry && entry.content) ||
                                 ('summary' in entry && entry.summary);
              if (!hasContent) {
                console.error('\u274c feed[' + i + '] missing preview, content, or summary field');
                errors++;
              }
              if (!('type' in entry)) {
                console.error('\u274c feed[' + i + '] missing required field: type');
                errors++;
              } else if (!entry.type) {
                console.error('\u274c feed[' + i + '] empty type — must be one of: ' + knownTypes.join(', '));
                errors++;
              } else if (!knownTypes.includes(entry.type)) {
                console.error('\u274c feed[' + i + '] unknown type: ' + entry.type + ' (allowed: ' + knownTypes.join(', ') + ')');
                errors++;
              }
              if (!entry.date) {
                console.error('\u274c feed[' + i + '] missing required field: date');
                errors++;
              } else if (!DATE_RE.test(entry.date)) {
                console.error('\u274c feed[' + i + '] date not in YYYY-MM-DD format: ' + JSON.stringify(entry.date));
                errors++;
              }
              if (!entry.time) {
                console.error('\u274c feed[' + i + '] empty time — all feed entries must have a timestamp');
                errors++;
              } else if (!TIME_RE.test(entry.time)) {
                console.error('\u274c feed[' + i + '] time not in HH:MM format: ' + JSON.stringify(entry.time));
                errors++;
              }
            });
            if (errors > 0) process.exit(1);
            console.log('\u2705 feed.json entry schema valid — ' + d.feed.length + ' entries, all typed, dated, and timestamped');
          "

      - name: Check shell scripts
        run: |
          shopt -s nullglob
          count=0
          for f in scripts/*.sh; do
            bash -n "$f" && echo "✅ $f" || (echo "❌ $f" && exit 1)
            count=$((count + 1))
          done
          if [ "$count" -eq 0 ]; then
            echo "ℹ️  No .sh scripts found"
          fi
