name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  json:
    name: JSON integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate feed.json
        run: |
          python3 -c "
          import json, sys
          with open('feed.json') as f:
              d = json.load(f)
          assert 'lastUpdated' in d, 'missing lastUpdated'
          assert 'stats' in d, 'missing stats'
          assert 'feed' in d, 'missing feed array'
          print('feed.json valid -- stats:', d['stats'])
          "

      - name: Validate contemplations/data.json
        run: |
          python3 -c "
          import json, sys
          with open('contemplations/data.json') as f:
              items = json.load(f)
          assert isinstance(items, list), 'expected a list'
          for i, item in enumerate(items):
              assert 'slug' in item, f'item {i} missing slug'
              assert 'title' in item, f'item {i} missing title'
          print(f'contemplations/data.json: {len(items)} entries, all valid')
          "

      - name: Validate dreams/data.json
        run: |
          python3 -c "
          import json, sys
          with open('dreams/data.json') as f:
              items = json.load(f)
          assert isinstance(items, list), 'expected a list'
          print(f'dreams/data.json: {len(items)} entries')
          "

      - name: Validate dreams/dreams.json
        run: |
          python3 -c "
          import json
          with open('dreams/dreams.json') as f:
              d = json.load(f)
          print('dreams/dreams.json: valid JSON')
          "

      - name: Check no empty markdown files
        run: |
          python3 - << 'PYEOF'
          import os, sys, glob
          files = glob.glob('contemplations/*.md') + glob.glob('dreams/*.md')
          empty = [f for f in files if os.path.getsize(f) == 0]
          if empty:
              for f in empty:
                  print(f'empty: {f}')
              sys.exit(1)
          print(f'checked {len(files)} markdown files, none empty')
          PYEOF

      - name: Check feed.json/data.json semantic consistency
        run: |
          python3 - << 'PYEOF'
          import json, sys
          with open('feed.json') as f:
              feed = json.load(f)
          with open('contemplations/data.json') as f:
              items = json.load(f)

          # feed.json latestContemplation slug should match data.json[0]
          if items and feed.get('latestContemplation'):
              feed_slug = feed['latestContemplation'].get('slug', '')
              data_slug = items[0].get('slug', '')
              if feed_slug != data_slug:
                  print(f'MISMATCH: feed.json latestContemplation.slug={feed_slug!r} '
                        f'but contemplations/data.json[0].slug={data_slug!r}')
                  sys.exit(1)
              print(f'Slug consistent: {feed_slug!r}')

          # stats.contemplationCount should match len(items)
          count = feed.get('stats', {}).get('contemplationCount', None)
          if count is not None and count != len(items):
              print(f'ERROR: stats.contemplationCount={count} but data.json has {len(items)} entries')
              sys.exit(1)
          else:
              print(f'Count consistent: {len(items)} contemplations')

          # stats.dreamCount should match len(dreams/data.json)
          with open('dreams/data.json') as f:
              dreams = json.load(f)
          dream_count = feed.get('stats', {}).get('dreamCount', None)
          if dream_count is not None and dream_count != len(dreams):
              print(f'ERROR: stats.dreamCount={dream_count} but dreams/data.json has {len(dreams)} entries')
              sys.exit(1)
          elif dream_count is None:
              print(f'WARNING: stats.dreamCount missing from feed.json')
          else:
              print(f'Dream count consistent: {len(dreams)} dreams')
          PYEOF
